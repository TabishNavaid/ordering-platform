worker_processes auto;

events { 
    worker_connections 1024; 
}

http { 
    include /etc/nginx/mime.types; 
    default_type application/octet-stream; 
    sendfile on; 
    keepalive_timeout 65; 
    
    server_tokens off; 

    server { 
        listen 8080; 
        server_name _; 
        
        # Absolute structural path for Railway
        root /app/public; 
        index index.php; 

        # ── Security Headers ──────────────────────────────────────────────── 
        add_header X-Frame-Options "SAMEORIGIN" always; 
        add_header X-Content-Type-Options "nosniff" always; 
        add_header X-XSS-Protection "1; mode=block" always; 
        add_header Referrer-Policy "strict-origin-when-cross-origin" always; 

        # ── No directory browsing ──────────────────────────────────────────── 
        autoindex off; 

        # ── Block access to includes/ — these are server-side only ────────── 
        location ~* /includes/ { 
            deny all; 
            return 404; 
        } 

        # ── Block dot-files (.env, .git, .htaccess, etc.) ─────────────────── 
        location ~ /\. { 
            deny all; 
            return 404; 
        } 

        # ── Static assets: serve directly with caching ─────────────────────── 
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ { 
            expires 30d; 
            add_header Cache-Control "public, immutable"; 
            try_files $uri =404; 
        } 

        # ── All other requests: PHP or file ───────────────────────────────── 
        location / { 
            try_files $uri $uri/ $uri.php?$query_string; 
        } 

        location ~ \.php$ { 
            try_files $uri =404; 
            fastcgi_split_path_info ^(.+\.php)(/.+)$; 
            fastcgi_pass 127.0.0.1:9000; 
            fastcgi_index index.php; 
            include /etc/nginx/fastcgi_params; 
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; 
            fastcgi_param PATH_INFO $fastcgi_path_info; 
            fastcgi_param SERVER_PORT $server_port; 
            
            # Pass Railway reverse-proxy headers to PHP 
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto; 
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for; 
        } 

        # ── Error pages ────────────────────────────────────────────────────── 
        error_page 404 /index.php; 
        error_page 500 502 503 504 /index.php; 
    } 
}
