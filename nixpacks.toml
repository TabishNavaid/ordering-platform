providers = ["php"]

[phases.setup]
nixPkgs = [ 
  "nginx",
  "php82", 
  "php82Extensions.pdo", 
  "php82Extensions.pdo_mysql", 
  "php82Extensions.mbstring", 
  "php82Extensions.curl", 
  "php82Extensions.gd", 
  "php82Extensions.exif", 
  "php82Extensions.bcmath" 
]

[start]
cmd = "php-fpm -y /app/php-fpm.conf -F & nginx -c /app/nginx.conf -g 'daemon off;'"
